# The admin agent can update this file via plain-text instructions.

company:
  name: Harper Web Services
  short_name: HWS
  model: "Productized digital services with AI leverage"
  mrr_focus: true
  discount_policy: "Reps can discount up to 20% (to floor). Below floor requires Harrison's approval. No exceptions."
  hourly_rate: 60  # website edits only, not discountable

commission:
  upfront_percent: 20
  recurring_percent: 10
  payment_terms: "Paid when customer pays. No clawbacks. Residuals accrue monthly, paid end of month."

weekly_benchmarks:
  audits_sold: 10
  new_mrr_clients: 2
  larger_ticket_sales: 1

sales_priority:
  - rank: 1
    label: "HIGHEST"
    products: ["AI SEO + GEO Audit", "AI SEO Services"]
    note: "Wedge → MRR pipeline. Every audit is a qualified lead for $500/mo."
  - rank: 2
    label: "HIGHEST"
    products: ["AI Workflows (Templated)"]
    note: "Pitch named examples. Hot verticals: dentists, salons, HVAC, law firms, realtors, coaches."
