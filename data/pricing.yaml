rules_of_engagement:
  - "Never promise delivery faster than SLA without checking with Harrison first."
  - "Never quote below floor without Harrison's explicit approval."
  - "Never quote Enterprise Workflows blind — always book a discovery call first."
  - "Never over-promise SEO results — no '#1 on Google' guarantees. Ever."
  - "Always push for MRR — one-time sales are good; recurring is the business."
  - "Always offer the Care Plan on websites."
  - "Always attach the wedge — if not ready for monthly, sell the audit."
  - "Every audit gets a walkthrough call — that's where the upsell lives."
  - "Lead with the ChatGPT hook."

red_flags:
  - "Can't articulate what they actually need"
  - "Haggles below floor on first call"
  - "Wants guarantees you can't make ('promise me #1 on Google by next week')"
  - "Hostile or disrespectful"
  - "Has sued or bad-mouthed past vendors publicly"
  - "Asks for work 'on spec' before paying"
  - "Requires NDA before initial conversation"
  - "Totally unrealistic timeline"
