wedge_strategy:
  flow: "$149 Audit → Walkthrough Call → $500/mo SEO Services → AI Workflows upsell"
  conversion_target: "30%+ from audit to MRR"
  why: "$149 is below decision threshold. Audit delivers real value, earning trust before asking for more."

products:
  - name: AI SEO + GEO Audit
    type: one-time
    category: wedge
    price: 149
    floor: 119
    commission_upfront: 29.80
    commission_recurring: null
    delivery_sla: "48 hours from payment"
    description: >
      Blanket audit covering Google SEO and Generative Engine Optimization (GEO).
      Crawls entire website, analyzes technical health, on-page content, keywords, backlinks.
      Checks brand visibility in ChatGPT, Perplexity, Claude, Google AI Overviews, Microsoft Copilot.
      Output is a polished PDF report with prioritized action list.
    deliverables:
      - "Executive Summary — visibility score (0-100) + top 5 priorities"
      - "Google SEO: technical health, on-page, content & keywords, backlink profile"
      - "GEO/AI Visibility: LLM citation audit, competitor comparison, source authority, schema review, content format analysis"
      - "Prioritized action list ranked by impact vs effort"
      - "Free 30-min walkthrough call (this is where the $500/mo upsell lives)"
    pitch_hook: >
      "How many times in the last week did you actually Google something versus ask ChatGPT?
      Your customers are doing the same. For $149 I'll run a blanket audit across Google AND
      every major AI platform and tell you exactly where you stand. Report in 48 hours, no commitment."
    upsell_path: "Audit → 30-min walkthrough → $500/mo AI SEO Services"
    target_customers:
      - "Local businesses whose site 'isn't really working'"
      - "E-comm stores losing to competitors"
      - "Unhappy agency clients (cheap second opinion)"
      - "Anyone who uses ChatGPT themselves"

  - name: AI SEO Services
