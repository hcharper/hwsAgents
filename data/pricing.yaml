      (ChatGPT, Perplexity, Claude, Google AI Overviews). GEO bundled at no extra cost.
      Uses AI internally to deliver what agencies charge $2k-$5k/mo for.
    deliverables:
      - "4 AI-assisted blog posts per month (weekly cadence, human-reviewed)"
